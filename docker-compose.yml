# Aitotech local stack — one command: .\scripts\dev-up.ps1
#
# Host ports:
#   nexus -> 8080   sayra -> 7860   n8n -> 5678   agents -> 8090
#
# Routely (Saas) is NOT in this compose — it is a separate serious project.
# Point ROUTELY_URL at your external Routely deploy (or local Saas outside this repo).

services:
  nexus:
    build: .
    ports:
      - "8080:8000"
    environment:
      NEXUS_API_KEY: ${NEXUS_API_KEY:-dev-key}
      SAYRA_URL: http://sayra:7860
      ROUTELY_URL: ${ROUTELY_URL:-http://host.docker.internal:8000}
      N8N_URL: http://n8n:5678
      N8N_WEBHOOK_BASE: http://n8n:5678/webhook
      AGENTS_URL: http://agents:8090
      ROUTELY_API_KEY: ${ROUTELY_API_KEY:-}
      AGENTS_API_KEY: ${AGENTS_API_KEY:-}
    depends_on:
      - sayra
      - n8n
      - agents
    extra_hosts:
      - "host.docker.internal:host-gateway"

  sayra:
    build: repos/Sayra
    ports:
      - "7860:7860"
    env_file:
      - path: repos/Sayra/.env
        required: false

  n8n:
    build: repos/ai-engine
    ports:
      - "5678:5678"
    environment:
      N8N_DIAGNOSTICS_ENABLED: "false"
      N8N_SECURE_COOKIE: "false"
    volumes:
      - n8n_data:/home/node/.n8n

  agents:
    build: repos/Aitotech-agents
    ports:
      - "8090:8090"
    environment:
      PORT: "8090"
    env_file:
      - path: repos/Aitotech-agents/.env
        required: false

volumes:
  n8n_data:
