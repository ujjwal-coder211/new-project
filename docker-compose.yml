# Aitotech local stack — one command: .\scripts\dev-up.ps1
#
# Host ports:
#   nexus -> 8080   sayra -> 7860   n8n -> 5678
#
# External (NOT in this compose — separate projects):
#   Routely (Saas)     -> set ROUTELY_URL
#   Aitotech-agents    -> set AGENTS_URL  (outreach / business agents)

services:
  nexus:
    build: .
    ports:
      - "8080:8000"
    environment:
      NEXUS_API_KEY: ${NEXUS_API_KEY:-dev-key}
      SAYRA_URL: http://sayra:7860
      ROUTELY_URL: ${ROUTELY_URL:-http://host.docker.internal:8000}
      N8N_URL: http://n8n:5678
      N8N_WEBHOOK_BASE: http://n8n:5678/webhook
      AGENTS_URL: ${AGENTS_URL:-http://host.docker.internal:8090}
      ROUTELY_API_KEY: ${ROUTELY_API_KEY:-}
      AGENTS_API_KEY: ${AGENTS_API_KEY:-}
    depends_on:
      - sayra
      - n8n
    extra_hosts:
      - "host.docker.internal:host-gateway"

  sayra:
    build: repos/Sayra
    ports:
      - "7860:7860"
    env_file:
      - path: repos/Sayra/.env
        required: false

  n8n:
    build: repos/ai-engine
    ports:
      - "5678:5678"
    environment:
      N8N_DIAGNOSTICS_ENABLED: "false"
      N8N_SECURE_COOKIE: "false"
    volumes:
      - n8n_data:/home/node/.n8n

volumes:
  n8n_data:
